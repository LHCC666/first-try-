# 🏛️ 王利明·民法总则（第三版）
## 第一章 民法概述
### 第一节 民法的概念
#### 一、民法的语源
##### "民法"一词最早见于《尚书·孔氏传》
##### 私法意义上的"民法"由日文转译而来
##### 词源上源于拉丁文"市民法（ius civile）"
#### 二、民法的两种含义
##### （一）形式意义上的民法：民法典
###### 体系化、系统化的产物，民事法律中最高形式的成文法
###### 我国2017年通过《民法总则》，实质性地迈出民法典制定步伐
##### （二）实质意义上的民法：所有调整民事关系的法律规范总称
###### 包括民法典和其他民事法律、法规
###### 不限于法律、法规，还包括大量其他规范性文件和司法解释
#### 三、我国民法的概念
##### 《民法总则》第2条：民法是调整平等主体的自然人、法人和非法人组织之间的人身关系和财产关系的法律规范的总和
##### 意义①：确立民法统一调整社会主义市场交易关系的基本法地位
##### 意义②：将人身关系置于财产关系之前，突出对人的尊重
##### 意义③：奠定了民法典的体系基础
##### 意义④：确立了民商合一体制
#### 四、民法的任务
##### 《民法总则》第1条：根据宪法，制定本法
##### （一）保障民事权益（民法典是"民事权利的宣言书"）
##### （二）调整民事关系（平等主体之间人身关系和财产关系）
##### （三）维护社会和经济秩序（定分止争，保护产权）
##### （四）适应中国特色社会主义发展要求
##### （五）弘扬社会主义核心价值观
### 第二节 民法的性质
#### 一、民法是私法
##### 公法与私法的区分标准：利益说、隶属说（意思说）、主体说
##### 应从社会关系的性质和主体的性质结合起来区分公法和私法
##### 私法领域奉行私法自治，"法无禁止即可为"
##### 公法领域"法无授权不可为"
##### 民法是私法最主要的部分，但不完全等同于私法
#### 二、民法是市场经济的基本法
##### 从历史沿革看，民法始终与商品经济和市场经济紧密联系
##### 主体制度：确认独立主体（意志独立、财产独立、责任自负）
##### 物权制度：产权初始界定是交易的前提
##### 债和合同制度：财产交易在法律上的体现
##### 客体制度：适应交易需要而产生和发展
#### 三、民法是市民社会的基本法
##### 市民社会：与国家相分离的社会自组织状态
##### 民法调整的人身关系和财产关系涉及社会生活方方面面
#### 四、民法是权利法
##### 民法典被称为"民事权利的宣言书"
##### 民法体系以权利为基本逻辑起点
##### 《民法总则》专设"民事权利"一章，第126条为新型民事权益保护预留空间
#### 五、民法主要是实体法
##### 民法既是行为规范（确立交易规则和生活规则），又是裁判规则
### 第三节 民法的调整对象
#### 一、民法调整平等主体之间的人身关系和财产关系
##### 依据：《民法总则》第2条
##### 平等性的核心含义
###### 当事人法律地位平等，任何一方不凌驾于另一方
###### 适用规则的平等（法律面前人人平等）
###### 权利保护的平等
##### 例外：身份法领域存在一定不平等（如亲权、监护关系）
#### 二、民法调整平等主体之间的人身关系
##### （一）人身关系的内容
###### 人格关系：生命权、身体权、健康权、姓名权、肖像权、名誉权、荣誉权、隐私权、婚姻自主权等
###### 身份关系：亲属关系中的地位 + 基于知识产权获得的地位
##### （二）人身关系的特点
###### 非财产性（主要体现精神利益和道德利益）
###### 专属性（人身权益与人身难以分离，一般不可转让）
###### 固有性（人格利益大多是民事主体必备的、与生俱来的）
##### （三）民法调整人身关系的意义
###### 彰显民法本质特征（民法本质上是人法，终极价值是对人的关爱）
###### 体现21世纪时代精神（强化对人的尊严和自由的保护）
###### 反映现代法治基本要求（人格尊严是最高的法益）
#### 三、民法调整平等主体之间的财产关系
##### （一）财产关系的概念和内容
###### 财产归属关系（物权）：占有、使用、收益、处分
###### 财产流转关系（债权）：财产的交换
##### （二）财产关系的特征
###### 以经济利益的计算为核心
###### 充分体现主体的自由意志
###### 具有很强的变动性
###### 救济方式以损害赔偿等财产性方法为主
### 第四节 民法的历史发展
#### 一、民法起源于罗马法
##### 查士丁尼《国法大全》：《查士丁尼法典》《学说汇纂》《法学阶梯》《新律》
##### 罗马法已涵盖现代民法主要内容（人格、住所、时效、无因管理、不当得利、遗嘱继承等）
#### 二、从近代民法到现代民法
##### （一）近代民法的特点
###### 抽象的人格平等（梅因："从身份到契约"）
###### 无限制私有权原则
###### 契约自由原则
###### 过失责任原则
###### 注重维护形式正义
##### （二）现代民法的特点
###### 对所有权的限制（所有权负有义务，行使应有益于社会公益）
###### 对契约自由的限制（强制缔约、格式条款规制等）
###### 从单一过错责任向归责原则多元化转化（严格责任等）
###### 更注重对实质正义的维护（消费者、劳动者等弱势群体保护）
###### 人格权产生并日益受到重视（一般人格权、隐私权、精神损害赔偿）
###### 侵权法的独立与扩张
###### 民法的商法化趋势
###### 交易规则的一体化趋势
#### 三、我国民法的发展及未来
##### 古代"诸法合一、民刑不分"
##### 清末变法：1911年第一次民律草案
##### 南京国民政府：1929-1930年颁布民法典
##### 新中国：1986年《民法通则》→ 1999年《合同法》→ 2007年《物权法》→ 2009年《侵权责任法》
##### 2017年《民法总则》颁行，民法典各分编编纂进行中
### 第五节 民法与商法
#### 一、商法的概念及历史发展
##### 形式意义上的商法：商法典 + 公司法、保险法、破产法、票据法、海商法等单行法
##### 近代商法起源于11世纪欧洲商人习惯法
##### 1807年《法国商法典》标志民商分立体系形成
#### 二、民商合一体制
##### 我国采民商合一体制，不存在独立的商法部门
##### 《民法总则》采纳民商合一的具体体现
###### 民法基本原则普遍适用于民商事活动
###### 不区分商人和非商人，规定统一民事主体制度
###### 不采用商行为概念，采用统一民事法律行为制度
###### 不区分商事代理和民事代理，构建统一的代理制度
###### 构建统一的诉讼时效制度
##### 民法总则与商事法律是普通法与特别法的关系
### 第六节 民法和其他法律部门的区别
#### 一、民法和宪法
##### 宪法是民法的制定依据（《民法总则》第1条"根据宪法，制定本法"）
##### 区别：宪法为公法；调整对象和方法不同；义务性质不同；涉及范围不同
#### 二、民法和行政法
##### 区别：产生依据不同（国家意志 vs 自主自愿）；主体不同（必有一方为行政机关）；隶属性 vs 平等性；强行法 vs 任意法；权利性质不同
#### 三、民法与经济法
##### 经济法调整纵向的、具有行政隶属特征的经济管理关系
##### 区别：调整对象不同（纵向管理 vs 平等主体）；规范性质不同（强行性 vs 任意性）；宗旨不同（公共利益 vs 个体权益保护）
#### 四、民法和社会法
##### 社会法调整由个人基本生活权利保障而衍生的社会关系
##### 区别：私法 vs 兼具公法私法性质；任意性 vs 强行性；形式正义 vs 实质正义；财富创造 vs 财富分配
#### 五、民法与民事诉讼法
##### 相互依赖、密不可分（马克思："审判程序只是法律的生命形式"）
##### 区别：程序法 vs 实体法；公法 vs 私法；程序正义 vs 实体正义
### 第七节 民法的渊源
#### 一、宪法
##### 宪法中关于财产所有制、所有权、公民基本权利义务的规定是调整民事关系的重要规范
##### 法官不得直接援引宪法裁判，但可作为说理依据和合宪性解释依据
#### 二、民事法律
##### 全国人大及其常委会制定和颁布的民事立法文件，是我国民法的主要表现形式
##### 民事基本法（民法总则、合同法、物权法、侵权责任法等）+ 商事特别法
#### 三、国务院发布的行政法规
##### 效力仅次于宪法和民事法律
#### 四、行政规章
##### 经审查认定为合法有效的，可作为裁判说理依据
#### 五、最高人民法院的司法解释
##### 事实上已成为法律渊源
##### 指导性案例不是法律渊源，但可作为裁判说理理由
#### 六、地方性法规或者自治条例和单行条例
##### 但不能直接作为判断合同效力的依据
#### 七、国际条约和国际惯例
##### 国际条约优先于国内法适用（针对涉外民事关系）
##### 国际惯例效力低于中国法律
#### 八、不违背公序良俗的习惯
##### 《民法总则》第10条：处理民事纠纷，应当依照法律；法律没有规定的，可以适用习惯，但是不得违背公序良俗
##### 条件：不违反法律强制性规定 + 不违反公序良俗
##### 法理未被规定为民法渊源，但可作为裁判说理依据
### 第八节 民法的适用
#### 一、民法的适用范围
##### （一）时间上的适用范围
###### 民法自实施之日发生效力，至废止之日停止（《民法总则》第206条）
###### 不溯及既往为原则，有利追溯为例外
##### （二）空间上的适用范围
###### 域内效力：中华人民共和国领域内的民事活动适用中国法律（《民法总则》第12条）
###### 域外效力：法律一般不能当然产生域外效力，例外情况下可规定
##### （三）对人的适用范围
###### 我国民法对境内的中国公民和中国法人具有法律效力
###### 对境内外国人、无国籍人和外国法人原则上具有法律效力
###### 居留在外国的我国公民原则上适用所在国法律
#### 二、民法适用的基本原则
##### （一）上位法优先于下位法原则
###### 宪法 > 法律 > 行政法规 > 地方性法规 > 地方政府规章
##### （二）新法优先于旧法原则
###### 《民法总则》生效后，与《民法通则》不一致的适用《民法总则》
##### （三）特别法优先于普通法原则
###### 《民法总则》第11条：其他法律对民事关系有特别规定的，依照其规定
###### 民事特别法/商事特别法优先于民法总则；分则优先于总则

## 第二章 民法的基本原则
### 第一节 民法基本原则概述
#### 贯穿民法各项制度的基本准则
#### 功能
##### 立法准则（指导立法）
##### 行为准则（指引民事主体）
##### 审判准则（裁判依据）
##### 漏洞填补（法律无规定时的补充）
### 第二节 民事权益受法律保护原则
#### 《民法典》第3条
#### 一切民事权益均受法律保护
#### 任何组织或个人不得侵犯
### 第三节 平等原则
#### 《民法典》第4条
#### 形式平等（法律地位平等）
#### 实质平等（弱势群体特殊保护）
##### 消费者权益保护
##### 格式条款规制
### 第四节 意思自治原则
#### 《民法典》第5条（意思自治）
#### 合同自由
#### 遗嘱自由
#### 婚姻自由
#### 营业自由（选择经营范围的自由）
#### 限制：不得违反强制性规定和公序良俗
### 第五节 公平原则
#### 《民法典》第6条
#### 与意思自治的张力与平衡
#### 具体体现
##### 显失公平制度（可撤销）
##### 情势变更制度
##### 格式条款无效规则
##### 公平责任
### 第六节 诚实信用原则
#### 《民法典》第7条
#### 帝王条款
#### 功能
##### 行为准则（当事人在民事活动中应诚实守信）
##### 填补合同漏洞
##### 解释合同/法律行为的依据
##### 平衡利益
##### 修正法律严格适用的不足
#### 衍生规则
##### 禁止权利滥用
##### 缔约过失责任
##### 情势变更
### 第七节 符合法律和公序良俗原则
#### 《民法典》第8条
#### 公共秩序（社会公共利益）
#### 善良风俗（社会一般道德观念）
#### 与诚信原则的区别
##### 诚信：主观善意、特定当事人之间
##### 公序良俗：客观标准、社会公共利益
#### 违反后果：民事法律行为无效
### 第八节 绿色原则
#### 《民法典》第9条（第三版新增）
#### 节约资源、保护生态环境
#### 功能
##### 指引民事活动遵循生态环保要求
##### 与侵权责任编的生态环境损害责任衔接

## 第三章 民事法律关系概述
### 第一节 民事法律关系的一般原理
#### 概念：由民法调整的、以权利义务为内容的社会关系
#### 特征
##### 平等主体之间的关系
##### 以意思自治为基础
##### 以民事权利义务为内容
##### 受国家强制力保障
### 第二节 民事法律关系的要素
#### 主体
##### 自然人
##### 法人
##### 非法人组织
##### 国家（特殊民事主体）
#### 内容
##### 民事权利
##### 民事义务
#### 客体
##### 物（动产、不动产）
##### 行为（作为、不作为）
##### 智力成果
##### 人身利益
##### 数据和网络虚拟财产
##### 其他（股权、继承权客体等）
### 第三节 民事法律事实
#### 事件（与人的意志无关）
##### 自然事实（出生、死亡、自然灾害）

#### 限制民事行为能力
##### 8-18周岁的未成年人
##### 不能完全辨认自己行为的成年人
##### 可独立实施
###### 纯获利益的行为
###### 与年龄/智力/精神状况相适应的行为
###### 其他需法定代理人同意或追认
#### 无民事行为能力
##### 不满8周岁的未成年人
##### 完全不能辨认自己行为的成年人

##### 意定监护（本人预先以书面形式确定监护人）
#### 监护人的职责
##### 保护被监护人的人身、财产权益
##### 代理被监护人实施法律行为
##### 除为维护被监护人利益外，不得处分其财产

##### 怠于履行或侵害被监护人权益
##### 法院根据有关个人或组织申请撤销
### 第四节 宣告失踪
#### 条件（《民法总则》第40-41条）
##### 自然人下落不明满2年（自失去音讯之日起算）
##### 利害关系人向人民法院申请
##### 经人民法院依据法定程序宣告
#### 法律效果
##### 确定财产代管人（配偶/成年子女/父母或其他愿意者→有争议由法院指定）
##### 代管人妥善管理失踪人财产、清偿债务、追索债权
##### 仅因故意或重大过失造成损失才承担赔偿责任
#### 财产代管人变更（第44条）
##### 利害关系人申请变更（代管人不履职/侵害权益/丧失能力）
##### 代管人有正当理由可自行申请变更
#### 撤销
##### 失踪人重新出现
##### 本人或利害关系人申请
##### 人民法院撤销失踪宣告
##### 法律后果：财产代管关系终止，代管人移交财产并报告代管情况
### 第五节 宣告死亡
#### 条件（《民法总则》第46条）
##### 一般情形：下落不明满4年
##### 意外事故：下落不明满2年
##### 因意外事件经有关机关证明不可能生存：不受时间限制
##### 利害关系人申请（有顺序限制：配偶→父母/子女→兄弟姐妹等→其他）
##### 人民法院依法定程序宣告
#### 死亡时间认定（第48条）
##### 一般情形：人民法院宣告死亡的判决作出之日
##### 因意外事件宣告死亡：意外事件发生之日
#### 法律效果
##### 效力及于一切人
##### 不当然消灭主体资格（仍生存时实施的民事法律行为有效，第49条）
##### 婚姻关系消灭（自死亡宣告之日起）
##### 财产作为遗产发生继承
#### 撤销效果（第50-53条）
##### 婚姻：原则上自行恢复；但配偶再婚或向婚姻登记机关书面声明不愿意恢复的除外
##### 财产：继承人返还原物；无法返还的应当给予适当补偿
##### 利害关系人隐瞒真实情况致他人被宣告死亡的：返还财产+赔偿损失
##### 收养：不得以未经本人同意为由主张收养关系无效
### 第六节 个体工商户和农村承包经营户
#### 个体工商户（第54条）
##### 须经依法登记（不需批准，不禁止的行业均应登记）
##### 个人经营或家庭经营
##### 以个人财产或家庭财产承担债务
#### 农村承包经营户（第55条）

##### 以家庭为经营单位
##### 以农户财产承担债务
##### 事实上由部分成员经营的，以该部分成员的财产承担（第56条第2款）
#### 债务承担规则（第56条）
##### 个人经营以个人财产承担
##### 家庭经营以家庭财产承担
##### 难以区分个人还是家庭经营的，以家庭财产承担

## 第十一章 民事权利
### 第一节 民事权利概述
#### 概念：法律之力和特定利益的结合，是类型化了的利益
#### 本质学说
##### 意思说（意志说）：萨维尼，个人意志支配范围
##### 利益说：耶林，"受法律保护的利益"
##### 法力说（通说）：梅开尔，法律上之力+特定利益
##### 本书立场：基本赞同法力说，但须与利益说结合才妥当
#### 特征
##### （一）由民法所确认（私权，区别于公权的4点）
###### 法律依据不同（私法 vs 公法）
###### 义务主体不同（特定/不特定民事主体 vs 国家职责）
###### 权利内容与目的不同（市民社会 vs 政治国家）
###### 救济途径不同（民事诉讼 vs 行政复议/行政诉讼）
##### （二）由民事主体所享有的利益
##### （三）体现民事主体一定范围内的行为自由
###### 是否行使权利的自由
###### 处分非专属性权利的自由
###### 选择权利行使方式的自由
###### 选择权利救济方式的自由
##### （四）受国家强制力保障（无救济则无权利）
##### （五）权利是类型化了的利益（开放体系，第126条兜底）
#### 民法总则规定的特色和意义
##### 民法典是"民事权利的宣言书"
##### 时代性（首次确认隐私权、保护个人信息）
##### 全面性（广泛确认各类民事权利）
##### 规范公权、保障私权
### 第二节 民事权利的基本分类
#### 支配权 vs 请求权 vs 形成权 vs 抗辩权
##### 支配权：物权、人格权、知识产权
##### 请求权：债权请求权、物权请求权
##### 形成权：撤销权、解除权、追认权、抵销权
##### 抗辩权：时效抗辩、同时履行抗辩、先履行抗辩
#### 绝对权 vs 相对权
##### 绝对权：对抗一切人（物权、人格权）
##### 相对权：对抗特定人（债权）
#### 财产权、人身权与综合性权利
##### 财产权（物权、债权、知识产权等）
##### 人身权（人格权、身份权）
##### 综合性权利（兼具财产+人身属性：知识产权、社员权、继承权）
#### 既得权 vs 期待权
#### 主权利 vs 从权利
### 第三节 民事权利的主要类型
#### 人格权
##### 一般人格权（《民法总则》第109条）
###### 人身自由
###### 人格尊严
##### 具体人格权（《民法总则》第110条）
###### 自然人：生命权、身体权、健康权
###### 姓名权、名称权
###### 肖像权
###### 名誉权、荣誉权
###### 隐私权
###### 婚姻自主权
###### 个人信息受保护权（第111条）
#### 身份权（配偶权、亲权、亲属权）
#### 物权（所有权、用益物权、担保物权）
#### 债权（合同之债、侵权之债、无因管理、不当得利）
#### 知识产权（著作权、专利权、商标权）
#### 继承权
#### 股权和其他投资性权利

### 第四节 民事权利的取得和变动
#### 一、民事权利的取得
##### （一）取得方式（《民法总则》第129条）
###### 依民事法律行为取得（买卖、赠与等，最主要方式）
###### 依事实行为取得（如合法建造房屋）
###### 依法律规定的事件或法律直接规定取得（如出生、继承、添附）
###### 依法院判决取得（如确权判决）
##### （二）原始取得与继受取得
###### 原始取得（最初取得，不依赖原权利人意志）
###### 继受取得（传来取得，从原权利人处取得）
####### 单一继受取得
######## 移转继受（权利原样转移）
######## 创设继受（在原权利上创设新权利）
####### 全部继受取得（如财产继承、企业合并分立）
#### 二、民事权利的变更
##### 根据当事人约定变更（如合同变更、调解协议）
##### 基于法律规定变更（如添附、留置权设立、部分履行）
#### 三、民事权利的消灭
##### 绝对消灭（标的物灭失）
##### 相对消灭（权利主体变更，如所有权移转）
##### 具体原因：抛弃、转让、权利人死亡、超期不行使权利
### 第五节 民事权利的行使
#### 权利不得滥用原则（主客观统一标准）
##### 须有权利存在（前提）
##### 客观：损害国家利益/社会公共利益/他人合法权益
##### 主观：行为人有过错
##### 后果：行为人承担相应民事责任
### 第六节 民事权利的保护
#### 私力救济
##### 正当防卫（针对正在进行的非法侵害）
##### 紧急避险（为避免危险造成损害）
##### 自助行为（情况紧迫不能及时请求公力救济时）
###### 须在必要范围内
###### 事后须立即请求有关机关处理
#### 公力救济（诉讼）
##### 确认之诉（确认权利是否存在，针对支配权）
##### 给付之诉（请求对方作出某种行为，针对请求权）
##### 形成之诉（请求变更现有权利义务，针对形成权）

## 第十二章 民事法律行为制度概述
### 第一节 民事法律行为的概念和特征
#### 概念：民事主体通过意思表示设立、变更、终止民事法律关系的行为

## 第十五章 代理制度概述
### 第一节 代理概述
#### 概念：代理人以被代理人名义，在代理权限内独立为意思表示，效果直接归属于被代理人的制度
#### 代理的特征
##### 以被代理人名义实施
##### 在代理权限范围内
##### 代理人独立为意思表示（区别于使者）
##### 法律效果直接归属于被代理人
### 第二节 代理与相关概念的区别
#### 代理 vs 使者
##### 使者仅传达他人意思，不独立为意思表示
#### 代理 vs 居间
##### 居间仅报告/媒介机会，不参与法律行为
#### 代理 vs 行纪
##### 行纪人以自己名义，后果间接归属委托人
#### 代理 vs 代表
##### 代表：法定代表人行为即法人自身行为
##### 代理：代理人独立主体，效果归属被代理人
### 第三节 代理的分类
#### 法定代理 vs 意定代理
##### 法定代理：依法律直接规定（监护人）
##### 意定代理：依被代理人授权
#### 显名代理 vs 隐名代理
##### 显名：明确以被代理人名义
##### 隐名：虽以自己名义，但相对人知道代理关系
#### 本代理 vs 复代理
##### 复代理需经被代理人同意或追认（原则上）
##### 紧急情况下为维护被代理人利益可自行转委托
#### 单独代理 vs 共同代理
### 第四节 代理权
#### 代理权的性质：资格/权限说（通说）
#### 代理权的授予
##### 单方法律行为（授权行为）
##### 向代理人或相对人作出
##### 书面形式（法律规定时）
#### 授权行为与基础关系的无因性
##### 授权行为独立于委托/雇佣等基础关系
### 第五节 代理权的行使
#### 行使原则
##### 在代理权限范围内
##### 忠实义务（为被代理人利益计算）
##### 勤勉义务（尽善良管理人的注意）
##### 亲自代理（不得擅自转委托）
#### 滥用代理权的禁止
##### 自己代理（原则无效，被代理人同意/追认除外）
##### 双方代理（原则无效，被代理人同意/追认除外）
##### 与第三人恶意串通
###### 代理行为无效
###### 代理人与第三人连带责任
### 第六节 代理行为及其效果
#### 代理行为的有效要件
##### 代理人有代理权
##### 以被代理人名义
##### 代理行为本身合法
#### 法律效果直接归属被代理人
### 第七节 代理权的消灭
#### 意定代理终止事由
##### 代理期间届满或代理事务完成
##### 被代理人撤销委托/代理人辞去委托
##### 代理人死亡或丧失民事行为能力
##### 作为代理人/被代理人的法人终止

##### 被代理人取得/恢复完全民事行为能力

## 第十六章 无权代理和表见代理
### 第一节 无权代理概述
#### 概念：行为人无代理权而以他人名义实施法律行为
#### 类型
##### 表见代理
##### 狭义无权代理
### 第二节 表见代理
#### 概念：行为人无代理权，但相对人有理由相信其有代理权，代理行为有效
#### 构成要件
##### 行为人无代理权
##### 存在代理权授予的权利外观
##### 相对人善意且无过失（合理信赖）
##### 权利外观可归责于被代理人
#### 主要情形
##### 被代理人明知他人以自己名义实施而不否认
##### 授权委托书/印章/空白合同书等管理不善
##### 代理权终止后未及时通知/收回凭证
#### 法律效果
##### 代理行为有效（被代理人承担后果）
##### 被代理人可向无权代理人追偿
##### 相对人放弃表见代理主张无权代理也可
### 第三节 狭义的无权代理
#### 特征
##### 行为人无代理权
##### 以他人名义实施法律行为
##### 无权利外观
#### 法律效果
##### 被代理人追认→对其发生效力
##### 被代理人不追认→由行为人承担责任
##### 相对人的权利
###### 催告权（催告被代理人在30日内追认）
###### 善意相对人撤销权（追认前可撤销）
#### 行为人的责任
##### 履行债务或赔偿损失
##### 赔偿范围不超过追认时可获得的利益

##### 平等性（当事人之间）

#### 侵权责任
#### 缔约过失责任

##### 按份责任：各责任人按各自份额承担

#### 恢复原状
#### 修理、重作、更换

#### 赔偿损失

#### 消除影响、恢复名誉
#### 赔礼道歉
#### 惩罚性赔偿（法律特别规定时适用）

#### 不可抗力
##### 不能预见、不能避免、不能克服
#### 正当防卫
##### 不超过必要限度
#### 紧急避险
##### 危险由自然原因引起→受益人适当补偿
#### 受害人故意
#### 第三人原因

#### 自助行为

## 第十八章 时效制度概述
### 第一节 时效的概念和功能
#### 概念：一定事实状态持续达法定期间即产生法律后果的制度
#### 功能
##### 维护社会秩序稳定
##### 督促权利人及时行使权利（权利上睡觉不值得保护）
##### 避免因时间久远而举证困难
##### 减轻法院查证负担
### 第二节 时效的类型
#### 取得时效（占有时效）
##### 善意、公开、持续占有一段时间→取得所有权
##### 我国《民法典》暂未规定取得时效
#### 消灭时效（诉讼时效）
##### 权利人于法定期间不行使权利
##### 义务人可拒绝履行
##### 《民法典》规定：诉讼时效（第188条以下）
#### 我国现行法：仅规定诉讼时效，未规定取得时效

## 第十九章 诉讼时效
### 第一节 诉讼时效概述
#### 概念：权利人于法定期间内不行使权利，义务人可拒绝履行
#### 特征
##### 强制性规范（当事人不得约定排除或变更）
##### 法院不得主动适用诉讼时效（义务人须主动提出抗辩）
##### 仅适用于债权请求权（原则）
### 第二节 诉讼时效的适用范围
#### 适用
##### 债权请求权（主要适用对象）
#### 不适用（《民法典》第196条）
##### 请求停止侵害、排除妨碍、消除危险
##### 不动产物权和登记的动产物权的返还请求权
##### 请求支付抚养费、赡养费、扶养费
##### 其他依法不适用诉讼时效的请求权
### 第三节 诉讼时效期间的分类
#### 普通诉讼时效
##### 3年（向法院请求保护民事权利）
##### 自权利人知道或应当知道权利受损+义务人之日
#### 特别诉讼时效
##### 4年：国际货物买卖合同、技术进出口合同
##### 其他法律规定的特殊期间
#### 最长诉讼时效
##### 20年（自权利受到损害之日起）
##### 有特殊情况的法院可延长
### 第四节 诉讼时效期间的起算
#### 一般规则：知道或应当知道权利受损+义务人之日
#### 特殊起算规则
##### 分期履行债务：最后一期履行期限届满之日
##### 无/限制行为能力人对法定代理人：法定代理终止之日
##### 未成年人受性侵害：年满18周岁之日
##### 合同未约定履行期限：债权人第一次主张权利之日
### 第五节 诉讼时效期间的中断、中止和延长
#### 中断
##### 事由
###### 权利人向义务人提出履行请求
###### 义务人同意履行义务
###### 权利人提起诉讼或申请仲裁
###### 其他同等效力情形
##### 效果：已过期间归零，重新计算3年
#### 中止
##### 事由（在最后6个月内）
###### 不可抗力
###### 无民事行为能力人/限制民事行为能力人无法定代理人
###### 继承开始后未确定继承人或遗产管理人
###### 其他导致权利人不能行使权利的障碍
##### 效果：障碍消除后再计算6个月
#### 延长
##### 特殊情况下法院可依申请延长（适用于最长20年）
### 第六节 诉讼时效期间届满的后果
#### 义务人取得抗辩权（义务人可拒绝履行）
#### 实体权利不清灭，仅产生抗辩权
#### 法院不得主动适用诉讼时效
#### 义务人自愿履行后不得以时效届满为由请求返还
#### 时效届满后同意履行→视为放弃时效抗辩权
### 第七节 诉讼时效利益的抛弃
#### 概念：时效届满后债务人以明示/默示方式放弃时效抗辩权
#### 方式
##### 明确表示同意履行
##### 作出分期/延期/部分履行等承诺
##### 提供担保
#### 效果：不得再以诉讼时效期间届满为由抗辩

## 第二十章 期间与期日
### 第一节 期间的概念和分类
#### 期间 vs 期日
##### 期日：不可分的时间点（如某年某月某日）
##### 期间：从某一时点到另一时点的时间段
#### 分类
##### 法定期间（法律直接规定）
##### 指定期间（法院/仲裁机构指定）
##### 约定期间（当事人约定）
##### 不变期间 vs 可变期间
### 第二节 除斥期间
#### 概念：权利预定的存续期间，期间届满则权利本身消灭
#### 适用对象：形成权为主（撤销权、追认权、解除权等）
#### 特征
##### 期间届满权利本身消灭（非仅产生抗辩权）
##### 法院可主动依职权审查
##### 期间一般不可变（不适用中止/中断）
#### 除斥期间 vs 诉讼时效

| 比较 | 除斥期间 | 诉讼时效 |
|------|---------|---------|
| 适用对象 | 形成权 | 请求权（主要是债权） |
| 届满后果 | 权利消灭 | 义务人取得抗辩权 |
| 期间性质 | 不变（不中止/中断） | 可变（可中断/中止） |
| 法院可否主动审查 | 可以 | 不得 |
| 起算点 | 自权利成立时起算 | 自知道权利受损+义务人之日 |

### 第三节 期间的计算
#### 起算
##### 按小时计算：即时起算
##### 按日/月/年计算：开始的当天不计入
#### 最后一日
##### 截止时间：24时
##### 有业务时间按业务停止时间
##### 最后一日为法定休假日的→顺延至结束后第一日
#### 期间的表达
##### "以上""以下""以内"→含本数
##### "不满""超过""以外"→不含本数

</script>

<script>
(function() {
  var mm, root;
  var matches = [];
  var matchIdx = -1;

  try {
    var md = document.getElementById("__md__").textContent;
    var transformer = new window.markmap.Transformer();
    var result = transformer.transform(md);
    root = result.root;
  } catch(e) {
    document.body.innerHTML += '<div style="position:fixed;bottom:10px;left:10px;background:red;color:#fff;padding:10px;z-index:9999;border-radius:6px">ERR1:' + e.message + '</div>';
    return;
  }

  try {
    mm = window.markmap.Markmap.create('#mindmap', {
      autoFit: false,
      colorFreezeLevel: 3,
      duration: 300,
      maxWidth: 460,
      initialExpandLevel: 3,
      pan: true,
      zoom: true,
      fitRatio: 0.95,
      spacingHorizontal: 90,
      spacingVertical: 10,
    }, root);
    setTimeout(function() { mm.fit(); }, 300);
  } catch(e) {
    document.body.innerHTML += '<div style="position:fixed;bottom:10px;left:10px;background:red;color:#fff;padding:10px;z-index:9999;border-radius:6px">ERR2:' + e.message + '</div>';
    return;
  }

  window.fit = function() { mm && mm.fit(); };

  window.expandAll = function() {
    if (!root) return;
    var c = JSON.parse(JSON.stringify(root));
    (function x(n) { if(n.payload) delete n.payload.fold; if(n.children) n.children.forEach(x); })(c);
    mm.setData(c);
  };

  window.collapseAll = function() {
    if (!root) return;
    var c = JSON.parse(JSON.stringify(root));
    (function x(n) { if(n.depth >= 2) { n.payload = n.payload || {}; n.payload.fold = 1; } if(n.children) n.children.forEach(x); })(c);
    mm.setData(c);
  };

  function getNodes() {
    var svg = document.getElementById('mindmap');
    if (!svg) return [];
    return Array.from(svg.querySelectorAll('.markmap-node'));
  }

  function nodeText(n) {
    return (n.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
  }

  function clearSearch() {
    matches.forEach(function(n) { n.classList.remove('match-highlight', 'match-current'); });
    matches = []; matchIdx = -1;
    document.getElementById('searchInfo').textContent = '';
  }

  window.doSearch = function() {
    clearSearch();
    var q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q || q.length < 1) return;
    var nodes = getNodes();
    matches = nodes.filter(function(n) { return nodeText(n).indexOf(q) >= 0; });
    if (matches.length === 0) { document.getElementById('searchInfo').textContent = '0/0'; return; }
    matches.forEach(function(n) { n.classList.add('match-highlight'); });
    matchIdx = 0;
    gotoMatch(0);
  };

  function gotoMatch(idx) {
    if (matches.length === 0) return;
    matchIdx = ((idx % matches.length) + matches.length) % matches.length;
    document.getElementById('searchInfo').textContent = (matchIdx + 1) + '/' + matches.length;
    matches.forEach(function(n) { n.classList.remove('match-current'); });
    var node = matches[matchIdx];
    node.classList.add('match-current');
    var p = node.parentElement;
    while (p && p.id !== 'mindmap') {
      p.style.display = '';
      try { p.removeAttribute('display'); } catch(e2) {}
      p = p.parentElement;
    }
    // d3 zoom: 移动到搜索结果并 2.0x 放大
    var svgEl = document.getElementById('mindmap');
    try {
      var nodeRect = node.getBoundingClientRect();
      var svgRect = svgEl.getBoundingClientRect();
      if (nodeRect.width === 0 && nodeRect.height === 0) return;
      var svgCX = svgRect.left + svgRect.width / 2;
      var svgCY = svgRect.top + svgRect.height / 2;
      var ncx = nodeRect.left + nodeRect.width / 2;
      var ncy = nodeRect.top + nodeRect.height / 2;
      var targetK = 2;
      if (mm && mm.zoom) {
        var t = d3.zoomTransform(svgEl);
        var sx = (ncx - t.x) / t.k;
        var sy = (ncy - t.y) / t.k;
        var nt = d3.zoomIdentity.translate(svgCX - targetK * sx, svgCY - targetK * sy).scale(targetK);
        d3.select(svgEl).transition().duration(500).call(mm.zoom.transform, nt);
        return;
      }
      var gEl = svgEl.firstElementChild;
      if (gEl && gEl.tagName === 'g') {
        var k = 1, x = 0, y = 0;
        if (svgEl.__zoom) { k = svgEl.__zoom.k; x = svgEl.__zoom.x; y = svgEl.__zoom.y; }
        var sx2 = (ncx - x) / k;
        var sy2 = (ncy - y) / k;
        var newX = svgCX - targetK * sx2;
        var newY = svgCY - targetK * sy2;
        d3.select(gEl).transition().duration(500)
          .attr('transform', 'translate(' + newX + ', ' + newY + ') scale(' + targetK + ')');
        if (svgEl.__zoom) { svgEl.__zoom.x = newX; svgEl.__zoom.y = newY; svgEl.__zoom.k = targetK; }
      }
    } catch(e) {
      node.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  window.nextMatch = function() {
    if (matches.length === 0) { window.doSearch(); return; }
    gotoMatch(matchIdx + 1);
  };

  window.prevMatch = function() {
    if (matches.length === 0) { window.doSearch(); return; }
    gotoMatch(matchIdx - 1);
  };

  window.handleSearchKey = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); if (matches.length === 0) window.doSearch(); else window.nextMatch(); }
    if (e.key === 'Escape') { document.getElementById('searchInput').value = ''; clearSearch(); }
  };

  document.addEventListener('keydown', function(e) {
    if (document.activeElement === document.getElementById('searchInput')) return;
    if (e.key === 'f' || e.key === 'F') { e.preventDefault(); window.fit(); }
    if (e.key === 'e' || e.key === 'E') { e.preventDefault(); window.expandAll(); }
    if (e.key === 'c' || e.key === 'C') { e.preventDefault(); window.collapseAll(); }
    if (e.key === '/' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); document.getElementById('searchInput').focus(); }
  });
})();
</script>
</body>
</html>
