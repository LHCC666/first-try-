# 🏛️ 王利明·民法总则（第三版）
## 第一章 民法概述
### 第一节 民法的概念
#### 形式民法 = 民法典（2021.1.1施行）
#### 实质民法 = 全部民事法律规范的总称
#### 民法是调整平等主体之间人身关系和财产关系的法律规范总和
### 第二节 民法的调整对象
#### 财产关系（平等主体之间）
##### 财产归属关系（物权）
##### 财产流转关系（债权）
#### 人身关系
##### 人格关系（生命、健康、名誉、隐私等）
##### 身份关系（配偶、亲子、亲属等）
### 第三节 民法的性质
#### 私法性质（核心特征）
#### 权利法性质（以权利为本位）
#### 市场经济基本法
#### 市民社会基本法
#### 实体法（非程序法）
### 第四节 民法的历史发展
#### 罗马法 → 法国民法典（1804）→ 德国民法典（1900）
#### 中国民法发展脉络
##### 大清民律草案（1911）
##### 中华民国民法（1929-1930）
##### 民法通则（1986）
##### 民法总则（2017）
##### 民法典（2021.1.1施行）
### 第五节 民法典的体系
#### 《民法典》七编制
##### 总则编 + 物权编 + 合同编 + 人格权编
##### 婚姻家庭编 + 继承编 + 侵权责任编
#### 总分结构：总则编提取公因式，各分编具体展开
#### 人格权独立成编（中国特色）
#### 侵权责任独立成编
### 第六节 民法与商法
#### 民商合一 vs 民商分立
##### 我国采民商合一体制
##### 商事特别法优先适用
#### 民法典为一般法，公司法/票据法等为特别法
### 第七节 民法与其他法律部门的关系
#### 与行政法：调整对象不同（平等关系 vs 管理关系）
#### 与经济法：宏观调控、市场规制属经济法
#### 与社会法：倾斜保护弱者属社会法
#### 与劳动法：劳动合同可适用民法一般规则
### 第八节 民法的渊源
#### 法律（民法典 + 民事特别法）
##### 民法典为核心渊源
##### 公司法、合伙企业法、消费者权益保护法等
#### 行政法规
#### 司法解释（最高人民法院）
#### 习惯（补充法源）
##### 不得违背公序良俗
##### 不得违反法律强制性规定
##### 适用前提：法律没有规定
### 第九节 民法的适用
#### 时间效力
##### 不溯及既往为原则
##### 有利溯及为例外
##### 《民法典时间效力规定》
#### 空间效力：中华人民共和国领域内
#### 对人效力：所有自然人、法人、非法人组织
##### 外国人适用（属地主 义+对等原则）

## 第二章 民法的基本原则
### 第一节 民法基本原则概述
#### 贯穿民法各项制度的基本准则
#### 功能
##### 立法准则（指导立法）
##### 行为准则（指引民事主体）
##### 审判准则（裁判依据）
##### 漏洞填补（法律无规定时的补充）
### 第二节 民事权益受法律保护原则
#### 《民法典》第3条
#### 一切民事权益均受法律保护
#### 任何组织或个人不得侵犯
### 第三节 平等原则
#### 《民法典》第4条
#### 形式平等（法律地位平等）
#### 实质平等（弱势群体特殊保护）
##### 消费者权益保护
##### 格式条款规制
### 第四节 自愿原则
#### 《民法典》第5条（意思自治）
#### 合同自由
#### 遗嘱自由
#### 婚姻自由
#### 营业自由（选择经营范围的自由）
#### 限制：不得违反强制性规定和公序良俗
### 第五节 公平原则
#### 《民法典》第6条
#### 与意思自治的张力与平衡
#### 具体体现
##### 显失公平制度（可撤销）
##### 情势变更制度
##### 格式条款无效规则
##### 公平责任
### 第六节 诚实信用原则
#### 《民法典》第7条
#### 帝王条款
#### 功能
##### 行为准则（当事人在民事活动中应诚实守信）
##### 填补合同漏洞
##### 解释合同/法律行为的依据
##### 平衡利益
##### 修正法律严格适用的不足
#### 衍生规则
##### 禁止权利滥用
##### 缔约过失责任
##### 情势变更
### 第七节 符合法律和公序良俗原则
#### 《民法典》第8条
#### 公共秩序（社会公共利益）
#### 善良风俗（社会一般道德观念）
#### 与诚信原则的区别
##### 诚信：主观善意、特定当事人之间
##### 公序良俗：客观标准、社会公共利益
#### 违反后果：民事法律行为无效
### 第八节 绿色原则
#### 《民法典》第9条（第三版新增）
#### 节约资源、保护生态环境
#### 功能
##### 指引民事活动遵循生态环保要求
##### 与侵权责任编的生态环境损害责任衔接

## 第三章 民事法律关系概述
### 第一节 民事法律关系的一般原理
#### 概念：由民法调整的、以权利义务为内容的社会关系
#### 特征
##### 平等主体之间的关系
##### 以意思自治为基础
##### 以民事权利义务为内容
##### 受国家强制力保障
### 第二节 民事法律关系的要素
#### 主体
##### 自然人
##### 法人
##### 非法人组织
##### 国家（特殊民事主体）
#### 内容
##### 民事权利
##### 民事义务
#### 客体
##### 物（动产、不动产）
##### 行为（作为、不作为）
##### 智力成果
##### 人身利益
##### 数据和网络虚拟财产
##### 其他（股权、继承权客体等）
### 第三节 民事法律事实
#### 事件（与人的意志无关）
##### 自然事实（出生、死亡、自然灾害）
##### 状态（下落不明、精神障碍、年龄）
#### 行为（人的有意识活动）
##### 民事法律行为（以意思表示为要素）
##### 准法律行为
###### 意思通知（催告）
###### 观念通知（通知瑕疵）
###### 情感表示（谅解）
##### 事实行为
###### 无因管理
###### 不当得利
###### 侵权行为
###### 添附
###### 遗失物拾得
### 第四节 民事权利的客体
#### 物
##### 动产 vs 不动产
##### 主物 vs 从物
##### 原物 vs 孳息
###### 天然孳息
###### 法定孳息
##### 特定物 vs 种类物
##### 可分物 vs 不可分物
##### 消费物 vs 非消费物
##### 流通物 vs 限制流通物 vs 禁止流通物
#### 行为
#### 智力成果
#### 人身利益
#### 数据和网络虚拟财产

## 第四章 自然人
### 第一节 自然人的民事权利能力
#### 概念：享有民事权利、承担民事义务的资格
#### 始于出生，终于死亡
##### 出生标准：独立呼吸说（通说）
##### 死亡标准：心跳停止+脑死亡
#### 胎儿利益保护
##### 涉及遗产继承、接受赠与等
##### 娩出时为死体的，权利能力自始不存在
#### 死者人格利益保护
##### 近亲属可主张（配偶、子女、父母优先）
##### 侵害英雄烈士人格利益特殊规定
### 第二节 自然人的民事行为能力
#### 完全民事行为能力
##### 18周岁以上的成年人
##### 16周岁以上+以自己劳动收入为主要生活来源→视为完全
#### 限制民事行为能力
##### 8-18周岁的未成年人
##### 不能完全辨认自己行为的成年人
##### 可独立实施
###### 纯获利益的行为
###### 与年龄/智力/精神状况相适应的行为
###### 其他需法定代理人同意或追认
#### 无民事行为能力
##### 不满8周岁的未成年人
##### 完全不能辨认自己行为的成年人
##### 法律行为须由法定代理人代理
### 第三节 监护
#### 未成年人监护
##### 父母为当然监护人
##### 父母死亡或无监护能力的，按顺序：祖/外→兄/姐→其他→组织
#### 成年人监护
##### 对无/限制民事行为能力的成年人
##### 配偶→父母/子女→其他近亲属→其他→组织
#### 监护类型
##### 法定监护（法律直接规定）
##### 指定监护（法院/居委会/村委会指定）
##### 遗嘱监护（父母遗嘱指定）
##### 协议监护（具有监护资格者协议确定）
##### 意定监护（本人预先以书面形式确定监护人）
#### 监护人的职责
##### 保护被监护人的人身、财产权益
##### 代理被监护人实施法律行为
##### 除为维护被监护人利益外，不得处分其财产
#### 监护的撤销
##### 怠于履行或侵害被监护人权益
##### 法院根据有关个人或组织申请撤销
### 第四节 宣告失踪
#### 条件
##### 下落不明满2年
##### 利害关系人向法院申请
#### 法律效果
##### 确定财产代管人
##### 代管人管理失踪人财产、清偿债务
#### 撤销
##### 本人或利害关系人申请
##### 财产代管关系终止
### 第五节 宣告死亡
#### 条件
##### 一般情形：下落不明满4年
##### 意外事故：下落不明满2年
##### 经证明不可能生存：不受时间限制
#### 法律效果
##### 等同自然死亡
##### 婚姻关系消灭
##### 财产发生继承
#### 撤销效果
##### 婚姻：配偶未再婚自动恢复（再婚则不恢复）
##### 财产：依法取得者应适当返还
##### 收养：不得以未经本人同意主张无效
### 第六节 个体工商户和农村承包经营户
#### 个体工商户
##### 个人经营或家庭经营
##### 以个人财产或家庭财产承担债务
#### 农村承包经营户
##### 以家庭为经营单位
##### 以家庭财产承担责任
#### 债务承担规则
##### 个人经营以个人财产承担
##### 家庭经营以家庭财产承担
##### 难以区分以家庭财产承担
### 第七节 自然人的身份证明和住所
#### 户籍登记
#### 住所
##### 户籍登记地或其他有效身份登记记载地
##### 经常居所地与住所不一致→经常居所地视为住所
#### 经常居所地：连续居住一年以上

## 第五章 法人的一般原理
### 第一节 法人的概念和性质
#### 概念：依法设立、拥有独立财产、独立承担民事责任的组织
#### 特征
##### 依法设立（准则主义为主）
##### 拥有独立财产
##### 独立承担民事责任（成员有限责任）
##### 以自己名义参加民事活动
### 第二节 法人的分类
#### 《民法典》三分法
##### 营利法人
##### 非营利法人
##### 特别法人
#### 传统学理分类
##### 公法人 vs 私法人
##### 社团法人 vs 财团法人
### 第三节 法人的民事权利能力和民事行为能力
#### 权利能力：始于成立，终于终止
#### 行为能力：受目的和经营范围限制
#### 法人与自然人权利能力的差异
##### 法人无身份权、继承权
##### 法人有人格权（名称权、名誉权等）
### 第四节 法人的设立与登记
#### 设立条件
##### 依法成立
##### 有名称、组织机构和场所
##### 有独立的财产
##### 能独立承担民事责任
#### 设立登记
##### 营利法人：经工商登记成立
##### 事业单位/社会团体：依法不需登记的除外
#### 登记效力：成立生效要件
#### 变更登记、注销登记
### 第五节 法人的法定代表人
#### 依法律或章程代表法人
#### 以法人名义从事的民事活动→法人承担后果
#### 越权行为的效力
##### 不得对抗善意相对人
##### 过错追偿
### 第六节 法人的终止
#### 终止原因：解散、宣告破产等
#### 清算
##### 清算义务人应及时组成清算组
##### 清算期间法人存续，但不得从事与清算无关的活动
#### 注销登记→法人终止

## 第六章 营利法人
### 第一节 营利法人的概念和类型
#### 概念：以取得利润并分配给股东等出资人为目的
#### 类型
##### 有限责任公司
##### 股份有限公司
##### 其他企业法人
### 第二节 营利法人的组织机构
#### 权力机构（股东会/股东大会）
#### 执行机构（董事会/执行董事）
#### 监督机构（监事会/监事）
#### 三权分立的内部治理结构
### 第三节 营利法人的特殊规则
#### 出资人不得滥用权利
##### 不得滥用法人独立地位和有限责任损害债权人利益
##### 法人人格否认（揭开公司面纱）
#### 关联交易规则
##### 不得利用关联关系损害法人利益
##### 造成损失的应赔偿
#### 决议撤销
##### 内容/程序违反法律或章程→出资人可申请撤销

## 第七章 非营利法人
### 第一节 非营利法人的概念和分类
#### 概念：为公益或其他非营利目的设立
#### 核心特征：不得向出资人/设立人分配利润
#### 可取得利润，但利润不得分配，须用于事业目的
### 第二节 事业单位法人
#### 国家出资设立
#### 提供公共服务（教育、科研、文化、医疗卫生等）
#### 依法不需登记的从成立之日取得法人资格
### 第三节 社会团体法人
#### 会员共同意愿
#### 非营利目的
#### 经依法登记成立
#### 典型：学会、协会、研究会等
### 第四节 捐助法人和宗教活动场所法人
#### 捐助法人
##### 基金会
##### 社会服务机构
##### 以捐助财产为基础
##### 设理事会为决策机构
#### 宗教活动场所法人
##### 可依法申请法人登记
##### 需具备法人条件

## 第八章 特别法人
### 第一节 特别法人概述
#### 《民法典》第96条新设类型
#### 不能简单归入营利/非营利
#### 由法律直接规定其法人地位
### 第二节 机关法人

#### 功能
##### 维护社会秩序稳定
##### 督促权利人及时行使权利（权利上睡觉不值得保护）
##### 避免因时间久远而举证困难
##### 减轻法院查证负担
### 第二节 时效的类型
#### 取得时效（占有时效）
##### 善意、公开、持续占有一段时间→取得所有权
##### 我国《民法典》暂未规定取得时效
#### 消灭时效（诉讼时效）
##### 权利人于法定期间不行使权利
##### 义务人可拒绝履行
##### 《民法典》规定：诉讼时效（第188条以下）
#### 我国现行法：仅规定诉讼时效，未规定取得时效

## 第十八章 诉讼时效
### 第一节 诉讼时效概述
#### 概念：权利人于法定期间内不行使权利，义务人可拒绝履行
#### 特征
##### 强制性规范（当事人不得约定排除或变更）
##### 法院不得主动适用诉讼时效（义务人须主动提出抗辩）
##### 仅适用于债权请求权（原则）
### 第二节 诉讼时效的适用范围
#### 适用
##### 债权请求权（主要适用对象）
#### 不适用（《民法典》第196条）
##### 请求停止侵害、排除妨碍、消除危险
##### 不动产物权和登记的动产物权的返还请求权
##### 请求支付抚养费、赡养费、扶养费
##### 其他依法不适用诉讼时效的请求权
### 第三节 诉讼时效期间的分类
#### 普通诉讼时效
##### 3年（向法院请求保护民事权利）
##### 自权利人知道或应当知道权利受损+义务人之日
#### 特别诉讼时效
##### 4年：国际货物买卖合同、技术进出口合同
##### 其他法律规定的特殊期间
#### 最长诉讼时效
##### 20年（自权利受到损害之日起）
##### 有特殊情况的法院可延长
### 第四节 诉讼时效期间的起算
#### 一般规则：知道或应当知道权利受损+义务人之日
#### 特殊起算规则
##### 分期履行债务：最后一期履行期限届满之日
##### 无/限制行为能力人对法定代理人：法定代理终止之日
##### 未成年人受性侵害：年满18周岁之日
##### 合同未约定履行期限：债权人第一次主张权利之日
### 第五节 诉讼时效期间的中断、中止和延长
#### 中断
##### 事由
###### 权利人向义务人提出履行请求
###### 义务人同意履行义务
###### 权利人提起诉讼或申请仲裁
###### 其他同等效力情形
##### 效果：已过期间归零，重新计算3年
#### 中止
##### 事由（在最后6个月内）
###### 不可抗力
###### 无民事行为能力人/限制民事行为能力人无法定代理人
###### 继承开始后未确定继承人或遗产管理人
###### 其他导致权利人不能行使权利的障碍
##### 效果：障碍消除后再计算6个月
#### 延长
##### 特殊情况下法院可依申请延长（适用于最长20年）
### 第六节 诉讼时效期间届满的后果
#### 义务人取得抗辩权（义务人可拒绝履行）
#### 实体权利不清灭，仅产生抗辩权
#### 法院不得主动适用诉讼时效
#### 义务人自愿履行后不得以时效届满为由请求返还
#### 时效届满后同意履行→视为放弃时效抗辩权
### 第七节 诉讼时效利益的抛弃
#### 概念：时效届满后债务人以明示/默示方式放弃时效抗辩权
#### 方式
##### 明确表示同意履行
##### 作出分期/延期/部分履行等承诺
##### 提供担保
#### 效果：不得再以诉讼时效期间届满为由抗辩

## 第十九章 期间与期日
### 第一节 期间的概念和分类
#### 期间 vs 期日
##### 期日：不可分的时间点（如某年某月某日）
##### 期间：从某一时点到另一时点的时间段
#### 分类
##### 法定期间（法律直接规定）
##### 指定期间（法院/仲裁机构指定）
##### 约定期间（当事人约定）
##### 不变期间 vs 可变期间
### 第二节 除斥期间
#### 概念：权利预定的存续期间，期间届满则权利本身消灭
#### 适用对象：形成权为主（撤销权、追认权、解除权等）
#### 特征
##### 期间届满权利本身消灭（非仅产生抗辩权）
##### 法院可主动依职权审查
##### 期间一般不可变（不适用中止/中断）
#### 除斥期间 vs 诉讼时效

| 比较 | 除斥期间 | 诉讼时效 |
|------|---------|---------|
| 适用对象 | 形成权 | 请求权（主要是债权） |
| 届满后果 | 权利消灭 | 义务人取得抗辩权 |
| 期间性质 | 不变（不中止/中断） | 可变（可中断/中止） |
| 法院可否主动审查 | 可以 | 不得 |
| 起算点 | 自权利成立时起算 | 自知道权利受损+义务人之日 |

### 第三节 期间的计算
#### 起算
##### 按小时计算：即时起算
##### 按日/月/年计算：开始的当天不计入
#### 最后一日
##### 截止时间：24时
##### 有业务时间按业务停止时间
##### 最后一日为法定休假日的→顺延至结束后第一日
#### 期间的表达
##### "以上""以下""以内"→含本数
##### "不满""超过""以外"→不含本数

<script>
(function() {
  var mm, root;
  var matches = [];
  var matchIdx = -1;

  try {
    var md = document.getElementById("__md__").textContent;
    var transformer = new window.markmap.Transformer();
    var result = transformer.transform(md);
    root = result.root;
  } catch(e) {
    document.body.innerHTML += '<div style="position:fixed;bottom:10px;left:10px;background:red;color:#fff;padding:10px;z-index:9999;border-radius:6px">ERR1:' + e.message + '</div>';
    return;
  }

  try {
    mm = window.markmap.Markmap.create('#mindmap', {
      autoFit: false,
      colorFreezeLevel: 3,
      duration: 300,
      maxWidth: 460,
      initialExpandLevel: 3,
      pan: true,
      zoom: true,
      fitRatio: 0.95,
      spacingHorizontal: 90,
      spacingVertical: 10,
    }, root);
    setTimeout(function() { mm.fit(); }, 300);
  } catch(e) {
    document.body.innerHTML += '<div style="position:fixed;bottom:10px;left:10px;background:red;color:#fff;padding:10px;z-index:9999;border-radius:6px">ERR2:' + e.message + '</div>';
    return;
  }

  window.fit = function() { mm && mm.fit(); };

  window.expandAll = function() {
    if (!root) return;
    var c = JSON.parse(JSON.stringify(root));
    (function x(n) { if(n.payload) delete n.payload.fold; if(n.children) n.children.forEach(x); })(c);
    mm.setData(c);
  };

  window.collapseAll = function() {
    if (!root) return;
    var c = JSON.parse(JSON.stringify(root));
    (function x(n) { if(n.depth >= 2) { n.payload = n.payload || {}; n.payload.fold = 1; } if(n.children) n.children.forEach(x); })(c);
    mm.setData(c);
  };

  function getNodes() {
    var svg = document.getElementById('mindmap');
    if (!svg) return [];
    return Array.from(svg.querySelectorAll('.markmap-node'));
  }

  function nodeText(n) {
    return (n.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
  }

  function clearSearch() {
    matches.forEach(function(n) { n.classList.remove('match-highlight', 'match-current'); });
    matches = []; matchIdx = -1;
    document.getElementById('searchInfo').textContent = '';
  }

  window.doSearch = function() {
    clearSearch();
    var q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q || q.length < 1) return;
    var nodes = getNodes();
    matches = nodes.filter(function(n) { return nodeText(n).indexOf(q) >= 0; });
    if (matches.length === 0) { document.getElementById('searchInfo').textContent = '0/0'; return; }
    matches.forEach(function(n) { n.classList.add('match-highlight'); });
    matchIdx = 0;
    gotoMatch(0);
  };

  function gotoMatch(idx) {
    if (matches.length === 0) return;
    matchIdx = ((idx % matches.length) + matches.length) % matches.length;
    document.getElementById('searchInfo').textContent = (matchIdx + 1) + '/' + matches.length;
    matches.forEach(function(n) { n.classList.remove('match-current'); });
    var node = matches[matchIdx];
    node.classList.add('match-current');
    var p = node.parentElement;
    while (p && p.id !== 'mindmap') {
      p.style.display = '';
      try { p.removeAttribute('display'); } catch(e2) {}
      p = p.parentElement;
    }
    // d3 zoom: 移动到搜索结果并 2.0x 放大
    var svgEl = document.getElementById('mindmap');
    try {
      var nodeRect = node.getBoundingClientRect();
      var svgRect = svgEl.getBoundingClientRect();
      if (nodeRect.width === 0 && nodeRect.height === 0) return;
      var svgCX = svgRect.left + svgRect.width / 2;
      var svgCY = svgRect.top + svgRect.height / 2;
      var ncx = nodeRect.left + nodeRect.width / 2;
      var ncy = nodeRect.top + nodeRect.height / 2;
      var targetK = 2;
      if (mm && mm.zoom) {
        var t = d3.zoomTransform(svgEl);
        var sx = (ncx - t.x) / t.k;
        var sy = (ncy - t.y) / t.k;
        var nt = d3.zoomIdentity.translate(svgCX - targetK * sx, svgCY - targetK * sy).scale(targetK);
        d3.select(svgEl).transition().duration(500).call(mm.zoom.transform, nt);
        return;
      }
      var gEl = svgEl.firstElementChild;
      if (gEl && gEl.tagName === 'g') {
        var k = 1, x = 0, y = 0;
        if (svgEl.__zoom) { k = svgEl.__zoom.k; x = svgEl.__zoom.x; y = svgEl.__zoom.y; }
        var sx2 = (ncx - x) / k;
        var sy2 = (ncy - y) / k;
        var newX = svgCX - targetK * sx2;
        var newY = svgCY - targetK * sy2;
        d3.select(gEl).transition().duration(500)
          .attr('transform', 'translate(' + newX + ', ' + newY + ') scale(' + targetK + ')');
        if (svgEl.__zoom) { svgEl.__zoom.x = newX; svgEl.__zoom.y = newY; svgEl.__zoom.k = targetK; }
      }
    } catch(e) {
      node.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  window.nextMatch = function() {
    if (matches.length === 0) { window.doSearch(); return; }
    gotoMatch(matchIdx + 1);
  };

  window.prevMatch = function() {
    if (matches.length === 0) { window.doSearch(); return; }
    gotoMatch(matchIdx - 1);
  };

  window.handleSearchKey = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); if (matches.length === 0) window.doSearch(); else window.nextMatch(); }
    if (e.key === 'Escape') { document.getElementById('searchInput').value = ''; clearSearch(); }
  };

  document.addEventListener('keydown', function(e) {
    if (document.activeElement === document.getElementById('searchInput')) return;
    if (e.key === 'f' || e.key === 'F') { e.preventDefault(); window.fit(); }
    if (e.key === 'e' || e.key === 'E') { e.preventDefault(); window.expandAll(); }
    if (e.key === 'c' || e.key === 'C') { e.preventDefault(); window.collapseAll(); }
    if (e.key === '/' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); document.getElementById('searchInput').focus(); }
  });
})();
</script>
</body>
</html>
