<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #eee;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 600px;
    width: 90%;
    padding: 32px 20px;

  h1 {
    text-align: center;
    font-size: 1.8em;
    margin-bottom: 4px;
    background: linear-gradient(135deg, #f5af19, #f12711);
    -webkit-background-clip: text;

  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 32px;

  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    color: #ccc;
  }
  .card:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    color: #fff;
  }
  .card .icon {
    font-size: 2em;
    flex-shrink: 0;
  }
  .card .info h3 {
    font-size: 1.05em;
    margin-bottom: 2px;
  }
  .card .info span {
    font-size: 0.8em;
    color: #888;
  }
  .card .arrow {
    margin-left: auto;
    font-size: 1.2em;
    color: #555;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7em;
    margin-left: 6px;
  }
  .badge-new { background: #e94560; color: #fff; }
  .badge-soon { background: #f0a500; color: #000; }
  .footer {
    text-align: center;
    color: #555;
    font-size: 0.75em;
    margin-top: 24px;
