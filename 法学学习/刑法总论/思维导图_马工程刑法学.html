## 绪论
### 第一节 刑法学概述
#### 一、刑法学的概念和研究对象
##### 以现行刑法为研究对象的部门法学

##### 重点研究：刑事政策和刑事立法
#### 二、刑法学的地位和作用
##### 国家基本法律 · 法学教育基础核心课程
##### 四大作用：支持刑事立法

#### 一、习近平法治思想的核心要义

##### 坚持中国特色社会主义法治道路

##### 指导刑事司法公正化

##### 注释方法

### 第一节 刑法的概念、性质与渊源
#### 一、刑法的概念
##### 规定犯罪、刑事责任和刑罚的法律规范的总称
##### 广义刑法 vs 狭义刑法
##### 刑法典 + 单行刑法 + 附属刑法
#### 二、刑法的性质
##### 公法性质（调整国家与个人之间的关系）
##### 强行法性质（当事人不得任意变更）
##### 制裁最严厉性（涉及生命、自由、财产）
##### 最后手段性（谦抑性、补充性）
#### 三、刑法的渊源
##### 刑法典（1997年修订，迄今11个修正案）
##### 单行刑法
##### 附属刑法
##### 刑法立法解释
##### 刑法司法解释
### 第二节 刑法的指导思想、根据与任务
#### 一、刑法的指导思想
##### 以马克思列宁主义、毛泽东思想为指导
##### 以宪法为立法依据
#### 二、刑法的根据
##### 宪法根据
##### 实践根据（同犯罪作斗争的经验）
##### 政策根据（宽严相济刑事政策）
#### 三、刑法的任务
##### 惩罚犯罪（用刑罚同一切犯罪行为作斗争）
##### 保护人民（保护国家安全、人民民主专政、社会主义制度）
##### 保护公民权利（人身权利、民主权利、财产权利）
##### 维护社会秩序（经济秩序、社会秩序）
##### 保障社会主义建设事业
### 第三节 刑法的沿革与发展
#### 一、中华人民共和国刑法的创制
##### 1979年第一部刑法典
##### 1979年至1997年间的单行刑法补充
#### 二、中华人民共和国刑法的完善
##### 1997年全面修订刑法典
##### 1997年后的11个刑法修正案
### 第四节 刑法的体系与解释
#### 一、刑法的体系
##### 总则（犯罪、刑事责任、刑罚的一般原理）
##### 分则（具体罪刑规范）
##### 编、章、节、条、款、项的结构
#### 二、刑法的解释
##### 立法解释（全国人大常委会）
##### 司法解释（最高人民法院、最高人民检察院）
##### 学理解释（专家学者，无法律约束力）
##### 文义解释 / 体系解释 / 历史解释 / 目的解释

## 第二章 刑法的基本原则 ⭐
### 第一节 刑法的基本原则概述
#### 一、刑法基本原则的概念
##### 贯穿全部刑法规范，指导和制约刑法适用的根本准则
#### 二、刑法基本原则的确定
##### 由刑法明确规定（第3条—第5条）
### 第二节 保障人权原则
#### 一、保障人权原则的含义
##### 刑法既要惩罚犯罪，也要保障人权
##### 保障无罪的人不受刑事追究
#### 二、保障人权原则的具体体现
##### 罪刑法定原则的确立
##### 死刑适用的严格限制
##### 刑罚人道主义
### 第三节 罪刑法定原则 ⭐⭐
#### 一、罪刑法定原则的含义
##### 《刑法》第3条：法律明文规定为犯罪行为的，依照法律定罪处刑
##### 法律没有明文规定为犯罪行为的，不得定罪处刑
##### 经典表述：法无明文规定不为罪，法无明文规定不处罚
#### 二、罪刑法定原则的立法体现
##### 反对类推制度
##### 罪刑规范的明确性要求
##### 禁止事后法（法不溯及既往）
##### 禁止绝对不定期刑
#### 三、罪刑法定原则的司法适用
##### 严格依照法律规定认定犯罪
##### 禁止超越法律进行扩张解释
##### 允许有利于被告人的类推解释
### 第四节 适用刑法人人平等原则
#### 一、适用刑法人人平等原则的含义
##### 《刑法》第4条：对任何人犯罪，在适用法律上一律平等
#### 二、适用刑法人人平等原则的具体体现
##### 定罪平等（同样行为同样定罪）
##### 量刑平等（同样情节同样处罚）
##### 行刑平等（同样改造表现同样对待）
### 第五节 罪责刑相适应原则 ⭐
#### 一、罪责刑相适应原则的含义
##### 《刑法》第5条：刑罚的轻重，应当与犯罪分子所犯罪行和承担的刑事责任相适应
#### 二、罪责刑相适应原则的立法体现
##### 轻重有别的刑罚体系
##### 区别对待的处罚制度
##### 根据不同情节设置不同法定刑幅度
#### 三、罪责刑相适应原则的司法适用
##### 量刑时要综合分析犯罪的社会危害性
##### 综合考虑犯罪人的主观恶性和人身危险性
##### 做到重罪重罚、轻罪轻罚、罚当其罪
### 第六节 刑法的其他基本原则
#### 一、罪责自负原则
##### 刑罚只适用于犯罪人本人
##### 反对株连，不株连无辜
#### 二、主客观相统一原则
##### 认定犯罪须同时具备客观危害行为与主观罪过
##### 反对客观归罪（只看结果不看罪过）
##### 反对主观归罪（只看罪过不看行为）

## 第三章 刑法的效力
### 第一节 刑法的空间效力
#### 一、刑法空间效力的概念和原则
##### 属地原则（以地域为标准）
##### 属人原则（以行为人国籍为标准）
##### 保护原则（以保护本国利益为标准）
##### 普遍原则（以保护国际共同利益为标准）
##### 我国采"以属地原则为基础，兼采其他原则"
#### 二、我国刑法的属地管辖权
##### 《刑法》第6条：凡在中华人民共和国领域内犯罪的
##### 领域范围：领陆、领水、领空 + 船舶、航空器
##### 行为地或结果地有一项在领域内，即可管辖
#### 三、我国刑法的属人管辖权
##### 《刑法》第7条：中国公民在领域外犯罪的
##### 普通公民：三年以下有期徒刑可以不追究
##### 国家工作人员和军人：一律适用中国刑法
#### 四、我国刑法的保护管辖权
##### 《刑法》第8条：外国人在领域外对中国国家或公民犯罪的
##### 按中国刑法最低刑三年以上 + 犯罪地法律也处罚
#### 五、我国刑法的普遍管辖权
##### 《刑法》第9条：中国缔结或参加的国际条约规定的罪行
#### 六、管辖冲突问题
##### 外国刑事判决在我国的效力
##### 一事不再理原则与例外
##### 跨境犯罪管辖权协调机制
### 第二节 刑法的时间效力
#### 一、刑法的生效时间
##### 自公布之日起生效
##### 公布后经过一定期间再生效
#### 二、刑法的失效时间
##### 新法明文废止旧法
##### 新法自然取代旧法（新法优于旧法）
#### 三、刑法的溯及力
##### 从旧兼从轻原则（《刑法》第12条）⭐
##### 一般适用行为时的法律（从旧）
##### 新法不认为是犯罪或处刑较轻的，适用新法（从轻）
##### 既判力优先：已生效判决不受影响

## 第四章 犯罪概念与犯罪构成
### 第一节 犯罪概念
#### 一、犯罪概念的界定模式
##### 形式定义（违反刑法规定，应受刑罚处罚）
##### 实质定义（具有社会危害性的行为）
##### 我国采形式与实质相结合的定义
##### 《刑法》第13条：犯罪的定义 + 但书条款
#### 二、犯罪的基本特征 ⭐
##### 严重的社会危害性（本质特征）
##### 刑事违法性（法律特征）
##### 应受刑罚处罚性（法律后果特征）
### 第二节 犯罪构成
#### 一、犯罪构成理论的发展与模式
##### 德日三阶层体系（构成要件该当性→违法性→有责性）
##### 英美双层体系（犯罪本体要件 + 辩护事由）
##### 我国四要件体系（客体、客观方面、主体、主观方面）
#### 二、我国刑法中犯罪构成的概念与特征
##### 决定某一行为成立犯罪所必需的全部主客观要件的有机统一
##### 法定性（由刑法规定）
##### 整体性（四要件缺一不可）
#### 三、犯罪构成的分类
##### 基本的犯罪构成 vs 修正的犯罪构成（预备、未遂、中止）
##### 普通的犯罪构成 vs 加重的/减轻的犯罪构成
##### 简单的犯罪构成 vs 复杂的犯罪构成
#### 四、犯罪构成的意义
##### 定罪依据（罪与非罪的界限）
##### 此罪与彼罪的界限
##### 一罪与数罪的界限
##### 正确量刑的基础

## 第五章 犯罪客体
### 第一节 犯罪客体的概念与特征
#### 一、犯罪客体的概念
##### 刑法所保护而为犯罪行为所侵害的社会关系
#### 二、犯罪客体的特征
##### 犯罪客体是一种社会关系
##### 为刑法所保护的社会关系（非全部社会关系）
##### 被犯罪行为所侵害的社会关系
#### 三、犯罪客体与犯罪对象
##### 犯罪客体 ≠ 犯罪对象
##### 犯罪客体= 社会关系（抽象）
##### 犯罪对象 = 具体的人或物
##### 所有犯罪都有犯罪客体，但并非都有犯罪对象
### 第二节 犯罪客体的分类
#### 一、一般客体
##### 一切犯罪所共同侵害的社会关系整体
##### 体现犯罪的共性
#### 二、同类客体
##### 某一类犯罪所共同侵害的社会关系
##### 刑法分则分章的基础
#### 三、直接客体
##### 某具体犯罪所直接侵害的社会关系
##### 简单客体 vs 复杂客体（如抢劫罪侵害人身权 + 财产权）

## 第六章 犯罪客观方面
### 第一节 犯罪客观方面概述
#### 一、犯罪客观方面的概念
##### 刑法规定的、说明行为对刑法所保护的社会关系造成侵害的客观外在表现
#### 二、犯罪客观方面的特征
##### 法定性（由刑法规定）
##### 客观性（外在表现）
##### 多样性（不同犯罪客观方面不同）
#### 三、犯罪客观方面的意义
##### 区分罪与非罪
##### 区分此罪与彼罪
##### 区分完成形态与未完成形态
##### 影响量刑轻重
### 第二节 危害行为
#### 一、危害行为的概念与特征
##### 人在意识支配下实施的危害社会的身体活动
##### 有体性（外在的身体活动）
##### 有意性（受意识支配，非反射/强制动作）
##### 有害性（对社会关系造成危害）
#### 二、危害行为的分类
##### 作为（不当为而为）
##### 不作为（当为而不为）⭐
###### 真正不作为犯
###### 不真正不作为犯
###### 不作为的成立条件：法定义务、能履行而不履行
### 第三节 危害结果
#### 一、危害结果的概念与特征
##### 危害行为给刑法所保护的社会关系造成的实际损害
#### 二、危害结果的分类
##### 物质性结果 vs 非物质性结果
##### 直接结果 vs 间接结果
##### 实害结果 vs 危险结果
### 第四节 刑法上的因果关系 ⭐
#### 一、刑法上因果关系的概念
##### 危害行为与危害结果之间的引起与被引起关系
#### 二、刑法上因果关系的特点
##### 客观性
##### 相对性
##### 顺序性（原因在前，结果在后）
##### 复杂性（一果多因、一因多果）
#### 三、刑法上因果关系的性质
##### 事实因果关系（条件说：若无则不）
##### 法律因果关系（相当因果关系说）
#### 四、刑法上因果关系的认定
##### 条件关系（事实基础的判断）
##### 相当性（法律价值的判断）
##### 介入因素对因果关系的阻断
#### 五、刑法上的因果关系与刑事责任
##### 存在因果关系 ≠ 必然承担刑事责任
##### 还需具备主观罪过
### 第五节 犯罪客观方面的其他要件
#### 一、行为的时间
##### 特定时间对某些犯罪的认定有意义
#### 二、行为的地点
##### 特定地点对某些犯罪的认定有意义（如禁渔区）
#### 三、行为的方法
##### 特定方法对某些犯罪的认定有意义（如暴力手段）

## 第七章 犯罪主体
### 第一节 犯罪主体概述
#### 一、犯罪主体的概念
##### 实施危害行为、依法应负刑事责任的自然人和单位
#### 二、犯罪主体的意义
##### 区分罪与非罪
##### 区分此罪与彼罪
##### 影响量刑轻重
### 第二节 自然人犯罪主体
#### 一、自然人犯罪主体的概念
##### 达到刑事责任年龄、具有刑事责任能力的自然人
##### 刑事责任年龄 ⭐
###### 完全负刑事责任：已满16周岁
###### 相对负刑事责任：已满14周岁不满16周岁（8种犯罪）
###### 从轻或减轻：已满12周岁不满14周岁（特定情形+最高检核准）
###### 从轻或减轻：已满14周岁不满18周岁
###### 完全不承担：不满12周岁
##### 刑事责任能力
###### 完全无责任能力（精神病人，不能辨认或控制自己行为）
###### 限制责任能力（尚未完全丧失辨认或控制能力）
###### 完全责任能力（正常人、醉酒人）
###### 醉酒人犯罪应负刑事责任
#### 二、自然人犯罪主体的特殊身份
##### 身份犯
###### 真正身份犯（身份影响定罪，如贪污罪需国家工作人员）
###### 不真正身份犯（身份影响量刑，如非法拘禁从重）
### 第三节 单位犯罪主体
#### 一、单位犯罪的概念
##### 公司、企业、事业单位、机关、团体实施的危害社会的行为
#### 二、单位犯罪的特征
##### 以单位名义实施
##### 为单位谋取非法利益
##### 体现单位意志（经单位决策程序）
##### 法律规定为单位犯罪的才追究刑事责任
#### 三、单位犯罪的处罚原则
##### 双罚制为原则（对单位判处罚金 + 追究直接责任人员刑事责任）
##### 单罚制为例外（法律另有规定时仅处罚直接责任人员）

## 第八章 犯罪主观方面
### 第一节 犯罪主观方面概述
#### 一、犯罪主观方面的概念
##### 犯罪主体对其实施的危害行为及危害结果所持的心理态度
#### 二、犯罪主观方面的特征
##### 内在性（内心活动，需通过客观表现推断）
##### 法定性（由刑法规定）
##### 包括罪过（故意、过失）、目的、动机
### 第二节 犯罪故意 ⭐
#### 一、犯罪故意的概念
##### 明知自己的行为会发生危害社会的结果，并且希望或放任这种结果发生
#### 二、犯罪故意的构成要素
##### 认识因素（明知）——对危害行为和危害结果的认识
##### 意志因素（希望或放任）——对危害结果的态度
#### 三、犯罪故意的分类
##### 直接故意 ⭐
###### 明知必然或可能发生危害结果
###### 希望结果发生
##### 间接故意 ⭐
###### 明知可能发生危害结果
###### 放任结果发生（听之任之）
##### 直接故意 vs 间接故意的区别
###### 认识因素不同（必然/可能 vs 可能）
###### 意志因素不同（希望 vs 放任）
###### 对定罪量刑的影响
#### 四、犯意转化与另起犯意
##### 犯意转化：同一犯罪过程中故意内容变化
##### 另起犯意：停止原犯罪意图后产生新的犯罪意图
### 第三节 犯罪目的与犯罪动机
#### 一、犯罪目的
##### 犯罪人希望通过实施犯罪行为达到的结果
##### 目的犯（以特定目的为构成要件）
#### 二、犯罪动机
##### 刺激犯罪人实施犯罪行为的内心起因
#### 三、犯罪动机与犯罪目的的关系
##### 区别：内心起因 vs 希望达到的结果
##### 联系：同一犯罪中，动机产生于前、目的形成于后
### 第四节 犯罪过失 ⭐
#### 一、犯罪过失的概念
##### 应当预见自己的行为可能发生危害社会的结果，因疏忽大意没有预见，或已经预见而轻信能够避免
#### 二、犯罪过失的分类
##### 疏忽大意的过失（无认识过失）⭐
###### 应当预见
###### 因疏忽大意没有预见
##### 过于自信的过失（有认识过失）⭐
###### 已经预见
###### 轻信能够避免
##### 过于自信的过失 vs 间接故意
###### 相同点：都预见到可能性
###### 不同点：过失是轻信能避免，放任是不关心结果
#### 三、认定犯罪过失应注意的几个问题
##### 注意义务的来源
##### 注意能力的判断标准（客观标准 vs 主观标准）
### 第五节 无罪过行为
#### 一、意外事件
##### 行为客观上造成损害，但主观上既无故意也无过失
##### 不能预见的原因引起
##### 不负刑事责任
#### 二、不可抗力
##### 因不能抗拒的原因造成损害
##### 非出于故意或过失
##### 不负刑事责任
#### 三、无期待可能性
##### 法律不强人所难
##### 在某些极端情况下不能期待行为人做出合法行为
### 第六节 刑法上的认识错误
#### 一、法律认识错误
##### 对行为的法律性质存在错误认识
##### 原则上不影响定罪（不知法律不免责）
##### 例外：因客观原因无法知晓法律时可能减轻或免除
#### 二、事实认识错误
##### 具体事实认识错误
###### 对象错误
###### 手段错误
###### 因果关系错误
##### 抽象事实认识错误
###### 不同构成要件之间对事实的认识错误
##### 处理：根据主客观相统一原则具体分析

## 第九章 正当行为
### 第一节 正当行为概述
#### 一、正当行为的概念与特征
##### 形式上符合某种犯罪的客观要件
##### 实质上不具有社会危害性
##### 为法律所允许甚至鼓励
#### 二、正当行为的种类
##### 正当防卫
##### 紧急避险
##### 其他正当行为（自救、正当业务、法令行为等）
#### 三、研究正当行为的意义
##### 区分正当与违法的界限
##### 保障公民正当权利的行使
### 第二节 正当防卫 ⭐⭐
#### 一、正当防卫的概念与特征
##### 为了保护国家、公共利益、本人或他人的人身、财产和其他权利
##### 对正在进行的不法侵害
##### 采取制止不法侵害的行为
##### 对不法侵害人造成损害的，不负刑事责任
#### 二、正当防卫的条件
##### 起因条件：存在不法侵害
##### 时间条件：不法侵害正在进行
##### 对象条件：针对不法侵害人本人
##### 目的条件：为了保护合法权益
##### 限度条件：未明显超过必要限度
#### 三、正当防卫中的特殊防卫
##### 《刑法》第20条第3款：对严重危及人身安全的暴力犯罪
##### 造成不法侵害人伤亡的，不属于防卫过当
##### 适用范围：行凶、杀人、抢劫、强奸、绑架等
#### 四、防卫过当及其刑事责任
##### 正当防卫明显超过必要限度造成重大损害
##### 应当减轻或免除处罚
### 第三节 紧急避险 ⭐
#### 一、紧急避险的概念与特征
##### 为了使国家、公共利益、本人或他人的人身、财产和其他权利
##### 免受正在发生的危险
##### 不得已采取的损害另一较小合法权益的行为
##### 不负刑事责任
#### 二、紧急避险的成立条件
##### 起因条件：存在现实的危险
##### 时间条件：危险正在发生
##### 对象条件：针对第三者的合法权益
##### 目的条件：保护合法权益
##### 限制条件：不得已而为之（最后手段）
##### 限度条件：未超过必要限度
##### 特殊限制：职务/业务上有特定义务的人不适用
#### 三、避险过当及其刑事责任
##### 超过必要限度造成不应有损害
##### 应当减轻或免除处罚
#### 四、紧急避险与正当防卫的异同
##### 相同点：法律根据相似、均不负刑事责任
##### 不同点：
###### 危险来源不同（人的侵害 vs 多种来源）
###### 损害对象不同（侵害人 vs 第三人）
###### 限制条件不同（无特殊限制 vs 不得已）
### 第四节 其他正当行为
#### 一、自救行为
##### 合法权益被侵害后自力恢复
##### 需在当时因客观原因无法请求公力救济
#### 二、正当业务行为
##### 依法从事业务活动中造成一定损害（如医疗手术）
##### 符合业务要求、在必要限度内
#### 三、法令行为
##### 依据法令执行的行为（如逮捕、执行死刑）
##### 依法进行则不构成犯罪
#### 四、基于权利人承诺或自愿的损害行为
##### 权利人真实、自愿的意思表示
##### 不违背公序良俗
##### 承诺必须在损害发生前作出

## 第十章 故意犯罪的停止形态 ⭐
### 第一节 故意犯罪停止形态概述
#### 一、故意犯罪停止形态的概念与特征
##### 故意犯罪发展过程中，因某种原因停止的终局状态
##### 只存在于故意犯罪中，过失犯罪无停止形态
#### 二、故意犯罪停止形态与犯罪构成的关系
##### 既遂形态：符合基本的犯罪构成
##### 未完成形态：符合修正的犯罪构成
### 第二节 犯罪既遂形态
#### 一、犯罪既遂形态的概念
##### 行为人着手实行犯罪，已完全实现犯罪构成全部要件
#### 二、犯罪既遂形态的类型
##### 行为犯（只要实施完毕某种行为即既遂）
##### 结果犯（须发生法定危害结果才既遂）
##### 危险犯（造成法定的危险状态即既遂）
##### 举动犯（一经着手实行即既遂）
#### 三、既遂犯的处罚原则
##### 按刑法分则对该罪规定的法定刑处罚
### 第三节 犯罪预备形态
#### 一、犯罪预备形态的概念与特征
##### 为实施犯罪准备工具、制造条件
##### 因意志以外原因未能着手实行犯罪
##### 客观上有准备工具/制造条件的行为
##### 主观上有实施犯罪的意图
#### 二、预备犯的处罚原则
##### 可比照既遂犯从轻、减轻或免除处罚
### 第四节 犯罪未遂形态 ⭐
#### 一、犯罪未遂形态的概念与特征
##### 已经着手实行犯罪
##### 犯罪未得逞
##### 因意志以外的原因
#### 二、犯罪未遂形态的种类
##### 实行终了的未遂 vs 未实行终了的未遂
##### 能犯未遂 vs 不能犯未遂
#### 三、未遂犯的处罚原则
##### 可比照既遂犯从轻或减轻处罚
### 第五节 犯罪中止形态 ⭐
#### 一、犯罪中止形态的概念与特征
##### 在犯罪过程中
##### 自动放弃犯罪或自动有效防止犯罪结果发生
##### 时间性（犯罪过程中，既遂前）
##### 自动性（自愿放弃，非被迫）⭐
##### 有效性（有效防止结果发生）
#### 二、中止犯的处罚原则
##### 未造成损害的，免除处罚
##### 造成损害的，减轻处罚

## 第十一章 共同犯罪 ⭐
### 第一节 共同犯罪概述
#### 一、共同犯罪的概念
##### 二人以上共同故意犯罪
#### 二、共同犯罪的成立要件
##### 主体要件：二人以上（自然人或单位）
##### 客观要件：共同的犯罪行为（分工协作）
##### 主观要件：共同的犯罪故意（意思联络）
#### 三、共同犯罪的认定
##### 不构成共同犯罪的情形
###### 共同过失犯罪（按各自所犯罪行分别处罚）
###### 一方故意、一方过失
###### 无意思联络的同时犯
###### 超出共同故意的过限行为
###### 事前无通谋的窝藏、包庇
### 第二节 共同犯罪的形式
#### 一、任意的共同犯罪与必要的共同犯罪
##### 任意共犯：可由一人实施也可由多人实施的犯罪
##### 必要共犯：必须由二人以上实施的犯罪（如聚众类犯罪）
#### 二、事前通谋的共同犯罪与事前无通谋的共同犯罪
##### 事前通谋：着手前已形成共同故意
##### 事前无通谋：刚刚着手或实行过程中形成故意
#### 三、简单的共同犯罪与复杂的共同犯罪
##### 简单共犯：所有人都是实行犯
##### 复杂共犯：有分工，有组织犯、教唆犯、帮助犯
#### 四、一般共同犯罪与有组织的共同犯罪
##### 一般共犯：松散结合，无固定组织形式
##### 有组织共犯：犯罪集团（三人以上、较稳定、经常纠集）
### 第三节 共同犯罪人及其刑事责任
#### 一、主犯及其刑事责任
##### 组织、领导犯罪集团的首要分子
##### 共同犯罪中起主要作用的分子
##### 首要分子对集团全部罪行负责
##### 其他主犯按其所参与的全部犯罪处罚
#### 二、从犯及其刑事责任
##### 起次要作用（次要实行犯）
##### 起辅助作用（帮助犯）
##### 从轻、减轻或免除处罚
#### 三、胁从犯及其刑事责任
##### 被胁迫参加犯罪
##### 按犯罪情节减轻或免除处罚
#### 四、教唆犯及其刑事责任
##### 教唆他人犯罪
##### 按在共同犯罪中的作用处罚
##### 教唆不满18周岁的人犯罪，从重处罚
##### 被教唆人未犯被教唆之罪，对教唆犯可从轻或减轻处罚

## 第十二章 罪数
### 第一节 罪数概述
#### 一、罪数形态研究的意义
##### 正确定罪（一罪还是数罪）
##### 合理量刑（数罪并罚还是一罪处罚）
##### 保障程序权利
#### 二、罪数的判断标准
##### 行为标准说
##### 结果标准说
##### 犯意标准说
##### 构成要件标准说（我国通说）
### 第二节 一罪的类型
#### 一、实质的一罪
##### 继续犯（犯罪行为与不法状态同时继续）
##### 想象竞合犯（一行为触犯数罪名，从一重罪处断）
##### 结果加重犯（基本犯罪行为致严重结果，加重处罚）
#### 二、法定的一罪
##### 结合犯（数个独立犯罪结合为新罪）
##### 转化犯（基础行为+转化条件→新罪）
##### 集合犯（以实施不定次数同种行为为目的）
#### 三、处断的一罪
##### 连续犯（连续实施数个同种犯罪行为，以一罪从重）
##### 牵连犯（手段行为与目的行为触犯不同罪名，择一重处断）
##### 吸收犯（数个行为轻重吸收，按重罪处罚）
### 第三节 数罪的类型
#### 一、异种数罪和同种数罪
##### 异种数罪：触犯不同罪名
##### 同种数罪：触犯同一罪名（不数罪并罚，但从重处罚）
#### 二、并罚的数罪和非并罚的数罪
##### 并罚的数罪：在法定期限内同时审判
##### 非并罚的数罪：因时效、既判力等原因不并罚
#### 三、判决宣告以前的数罪和刑罚执行期间的数罪
##### 判决前的数罪→并罚原则
##### 执行中发现漏罪→先并后减
##### 执行中又犯新罪→先减后并

## 第十三章 刑事责任
### 第一节 刑事责任概述
#### 一、刑事责任的概念
##### 犯罪人因其犯罪行为而应承受的来自国家的否定评价和谴责
#### 二、刑事责任的基本特征
##### 强制性（由国家强制力保障）
##### 严厉性（最严厉的法律责任形式）
##### 专属性（只能由犯罪人本人承担）
##### 双重性（实体性和程序性的统一）
#### 三、刑事责任与犯罪、刑罚的关系
##### 犯罪是刑事责任的前提
##### 刑事责任是犯罪的法律后果
##### 刑罚是实现刑事责任的主要方式
##### 三者关系：犯罪→刑事责任→刑罚
#### 四、刑事责任的地位
##### 作为犯罪与刑罚之间的中介和桥梁
### 第二节 刑事责任的根据
#### 一、刑事责任的哲学根据
##### 人的相对自由意志（决定论 vs 自由意志论）
##### 犯罪人基于自由意志选择了犯罪行为
#### 二、刑事责任的法律根据
##### 刑法规定的犯罪构成
##### 行为符合犯罪构成是承担刑事责任的法律依据
#### 三、刑事责任的事实根据
##### 客观上实施了危害社会的行为
##### 主观上具有犯罪的故意或过失
### 第三节 刑事责任的发展阶段
#### 一、刑事责任的产生阶段
##### 犯罪行为实施完毕时产生
#### 二、刑事责任的确认阶段
##### 侦查→审查起诉→审判
##### 法院作出有罪判决时最终确认
#### 三、刑事责任的实现阶段
##### 判决生效后进入刑罚执行
##### 非刑罚方法或单纯宣告有罪
### 第四节 刑事责任的解决方式
#### 一、刑事责任的实现方式
##### 定罪判刑（最常见的实现方式）
##### 定罪免刑（有罪判决但免除刑罚）
##### 非刑罚处罚方法
###### 赔偿经济损失
###### 训诫、责令具结悔过、赔礼道歉
###### 行政处罚或行政处分
#### 二、刑事责任的其他解决方式
##### 消灭处理（超过追诉时效、罪犯死亡等）
##### 转移处理（已由他国审判并执行）
##### 免除处理（特赦等法定免除）

## 第十四章 刑罚及其种类
### 第一节 刑罚与刑罚权
#### 一、刑罚的概念与特征
##### 刑法规定的由国家审判机关依法对犯罪人适用
##### 剥夺或限制某种权益的最严厉的法律制裁方法
##### 特征：严厉性、法定性、专属性和程序性
#### 二、刑罚权的概念与根据
##### 刑罚权是国家对犯罪人科处刑罚的权力
##### 制刑权（立法机关制定刑罚）
##### 求刑权（检察机关请求适用刑罚）
##### 量刑权（审判机关裁量刑罚）
##### 行刑权（执行机关执行刑罚）
### 第二节 刑罚的目的与功能
#### 一、刑罚的目的
##### 特殊预防（预防犯罪人本人再次犯罪）
##### 一般预防（预防社会上其他人犯罪）
##### 教育改造（通过劳动和教育使犯罪人回归社会）
#### 二、刑罚的功能
##### 对犯罪人的功能：惩罚、改造
##### 对社会的功能：威慑、教育、安抚
##### 对被害人的功能：抚慰
### 第三节 刑罚的体系与种类
#### 一、刑罚的体系
##### 主刑 + 附加刑的二元体系
##### 轻重有序、主附配合、构成科学体系
#### 二、主刑 ⭐
##### 管制
###### 不关押，限制一定自由
###### 实行社区矫正
###### 期限：3个月以上2年以下
##### 拘役
###### 短期剥夺自由，就近关押
###### 期限：1个月以上6个月以下
##### 有期徒刑
###### 期限：6个月以上15年以下
###### 数罪并罚时最长20/25年
###### 在监狱或其他执行场所执行
##### 无期徒刑
###### 终身剥夺自由
###### 可减为有期徒刑
##### 死刑 ⭐
###### 只适用于罪行极其严重的犯罪分子
###### 死刑缓期二年执行制度
###### 死刑复核程序（最高人民法院核准）
###### 对未成年人和审判时怀孕的妇女不适用死刑
#### 三、附加刑
##### 罚金
###### 强制向国家缴纳一定数额金钱
###### 单科或并科
##### 剥夺政治权利
###### 选举权和被选举权
###### 言论、出版、集会、结社等自由
###### 担任国家机关职务的权利
###### 担任国企、事业单位、人民团体领导职务的权利
##### 没收财产
###### 没收犯罪分子个人所有财产的一部或全部
###### 不得没收家属所有或应有的财产
##### 驱逐出境
###### 强迫犯罪的外国人离开中国国境

## 第十五章 刑罚制度
### 第一节 刑罚裁量（量刑）
#### 一、刑罚裁量概述
##### 人民法院依法对犯罪分子裁量决定刑罚的活动
#### 二、刑罚裁量的原则
##### 以事实为根据
##### 以法律为准绳
#### 三、刑罚裁量的情节
##### 法定情节
###### 应当型（必须适用）：应当从重、应当减轻等
###### 可以型（酌情适用）：可以从轻、可以减轻等
##### 酌定情节
###### 犯罪动机、手段、时间地点等
###### 犯罪后的态度
###### 犯罪人的一贯表现
#### 四、累犯 ⭐
##### 一般累犯
###### 前后两罪都是故意犯罪
###### 前后两罪均判有期徒刑以上
###### 后罪发生在前罪刑罚执行完毕或赦免后5年内
###### 从重处罚
##### 特别累犯
###### 前后两罪都是危害国家安全、恐怖活动等特定犯罪
###### 无时间间隔限制
###### 从重处罚
#### 五、自首与立功
##### 一般自首
###### 犯罪后自动投案
###### 如实供述自己的罪行
###### 可从轻或减轻处罚；较轻的，可免除
##### 特别自首（准自首）
###### 被采取强制措施或正在服刑
###### 如实供述司法机关未掌握的本人其他罪行
##### 坦白
###### 被动归案后如实供述
###### 可从轻处罚
##### 立功
###### 一般立功：可从轻或减轻
###### 重大立功：可减轻或免除
#### 六、数罪并罚
##### 吸收原则（死刑、无期徒刑吸收其他）
##### 限制加重原则（有期徒刑总和不超35年，最高20年；超过35年，最高25年）
##### 并科原则（附加刑仍须执行）
##### 判决后发现漏罪：先并后减
##### 执行中又犯新罪：先减后并
#### 七、缓刑
##### 适用条件
###### 判处拘役或3年以下有期徒刑
###### 犯罪情节较轻、有悔罪表现、无再犯危险
###### 对社区无重大不良影响
###### 累犯和犯罪集团首要分子不适用
##### 考验期
###### 拘役：原判刑期以上1年以下，不少于2个月
###### 有期徒刑：原判刑期以上5年以下，不少于1年
##### 缓刑撤销
###### 考验期内犯新罪或发现漏罪→撤销并数罪并罚
###### 违反监督管理规定情节严重→撤销，执行原判刑罚
### 第二节 刑罚执行和社区矫正
#### 一、刑罚执行和社区矫正概述
##### 刑罚执行：将生效判决付诸实施
##### 社区矫正：对符合条件的罪犯在社区中进行教育改造
#### 二、减刑 ⭐
##### 适用条件
###### 被判处管制、拘役、有期徒刑、无期徒刑
###### 在执行期间认真遵守监规、接受教育改造
###### 确有悔改表现或立功表现
##### 减刑后实际执行刑期的限制
###### 有期徒刑：不少于原判刑期的1/2
###### 无期徒刑：不少于13年
###### 死缓→无期→有期：总和不短于15年
#### 三、假释 ⭐
##### 适用条件
###### 有期徒刑执行1/2以上，无期徒刑执行13年以上
###### 认真遵守监规、接受教育改造
###### 确有悔改表现、无再犯危险
###### 累犯和特定严重暴力犯罪不适用
##### 考验期：剩余未执行完毕的刑期
##### 假释撤销
###### 考验期内犯新罪或发现漏罪→撤销并数罪并罚
#### 四、社区矫正
##### 适用对象：管制、缓刑、假释、暂予监外执行
##### 内容：监督管理 + 教育帮扶
##### 执行主体：社区矫正机构
### 第三节 刑罚消灭
#### 一、刑罚消灭概述
##### 因法定事由使刑罚归于消灭
##### 追诉时效和行刑时效
#### 二、时效
##### 追诉时效（犯罪后经过一定期限不再追诉）
###### 法定最高刑不满5年：经过5年
###### 法定最高刑5年以上不满10年：经过10年
###### 法定最高刑10年以上：经过15年
###### 法定最高刑无期/死刑：经过20年（20年后仍须追诉需最高检核准）
##### 追诉时效中断：又犯新罪，前罪追诉时效重新计算
##### 追诉时效中止：因客观原因无法追诉时暂停计算
#### 三、赦免
##### 大赦（既免罪又免刑，我国现行宪法未规定）
##### 特赦（免刑不免罪，由全国人大常委会决定）
`;

const { Markmap } = window.markmap;
const { Transformer } = window.markmap;

const transformer = new Transformer();
const { root } = transformer.transform(markdown);

let mm;
let matches = [];
let matchIdx = -1;

function render() {
  mm = Markmap.create('#mindmap', {
    autoFit: false,
    colorFreezeLevel: 3,
    duration: 300,
    maxWidth: 460,
    initialExpandLevel: 3,
    pan: true,
    zoom: true,
    fitRatio: 0.95,
    spacingHorizontal: 90,
    spacingVertical: 10,
  }, root);
  setTimeout(() => mm.fit(), 300);
}

render();

function fit() { mm.fit(); }

function expandAll() {
  const expanded = JSON.parse(JSON.stringify(root));
  function expand(node) {
    if (node.payload) delete node.payload.fold;
    if (node.children) node.children.forEach(expand);
  }
  expand(expanded);
  mm.setData(expanded);
}

function collapseAll() {
  const collapsed = JSON.parse(JSON.stringify(root));
  function collapse(node) {
    if (node.depth >= 2) {
      node.payload = node.payload || {};
      node.payload.fold = 1;
    }
    if (node.children) node.children.forEach(collapse);
  }
  collapse(collapsed);
  mm.setData(collapsed);
}

function getAllTextNodes() {
  const svg = document.getElementById('mindmap');
  if (!svg) return [];
  return Array.from(svg.querySelectorAll('.markmap-node'));
}

function getNodeText(node) {
  return (node.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
}

function clearHighlights() {
  matches.forEach(n => { n.classList.remove('match-highlight', 'match-current'); });
  matches = []; matchIdx = -1;
  document.getElementById('searchInfo').textContent = '';
}

function doSearch() {
  clearHighlights();
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!query || query.length < 1) return;
  const nodes = getAllTextNodes();
  matches = nodes.filter(n => getNodeText(n).includes(query));
  if (matches.length === 0) { document.getElementById('searchInfo').textContent = '0/0'; return; }
  matches.forEach(n => n.classList.add('match-highlight'));
  matchIdx = 0;
  gotoMatch(0);
}

function gotoMatch(idx) {
  if (matches.length === 0) return;
  matchIdx = ((idx % matches.length) + matches.length) % matches.length;
  document.getElementById('searchInfo').textContent = `${matchIdx + 1}/${matches.length}`;
  matches.forEach(n => n.classList.remove('match-current'));
  const node = matches[matchIdx];
  node.classList.add('match-current');

  // 确保节点可见：展开被折叠的父级
  let p = node.parentElement;
  while (p && p.id !== 'mindmap') {
    p.style.display = '';
    try { p.removeAttribute('display'); } catch(e) {}
    p = p.parentElement;
  }

  const svgEl = document.getElementById('mindmap');
  try {
    const nodeRect = node.getBoundingClientRect();
    const svgRect = svgEl.getBoundingClientRect();
    if (nodeRect.width === 0 && nodeRect.height === 0) return;

    const dx = (svgRect.left + svgRect.width / 2) - (nodeRect.left + nodeRect.width / 2);
    const dy = (svgRect.top + svgRect.height / 2) - (nodeRect.top + nodeRect.height / 2);

    // 优先用 markmap 自己的 zoom 做变换（标准d3路径）
    if (mm && mm.zoom) {
      const t = d3.zoomTransform(svgEl);
      const nt = d3.zoomIdentity.translate(t.x + dx, t.y + dy).scale(t.k);
      d3.select(svgEl).transition().duration(500).call(mm.zoom.transform, nt);
      return;
    }
    // 回退：直接操作 transform 属性
    const gEl = svgEl.firstElementChild;
    if (!gEl || gEl.tagName !== 'g') return;
    let k = 1, x = 0, y = 0;
    if (svgEl.__zoom) { k = svgEl.__zoom.k; x = svgEl.__zoom.x; y = svgEl.__zoom.y; }
    d3.select(gEl).transition().duration(500)
      .attr('transform', `translate(${x + dx}, ${y + dy}) scale(${k})`);
    if (svgEl.__zoom) { svgEl.__zoom.x = x + dx; svgEl.__zoom.y = y + dy; }
  } catch(e) {
    node.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function nextMatch() {
  if (matches.length === 0) { doSearch(); return; }
  matches[matchIdx]?.classList.add('match-highlight');
  gotoMatch(matchIdx + 1);
}

function prevMatch() {
  if (matches.length === 0) { doSearch(); return; }
  matches[matchIdx]?.classList.add('match-highlight');
  gotoMatch(matchIdx - 1);
}

function handleSearchKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); if (matches.length === 0) doSearch(); else nextMatch(); }
  if (e.key === 'Escape') { document.getElementById('searchInput').value = ''; clearHighlights(); }
}

document.addEventListener('keydown', e => {
  if (document.activeElement === document.getElementById('searchInput')) return;
  if (e.key === 'f' || e.key === 'F') { e.preventDefault(); fit(); }
  if (e.key === 'e' || e.key === 'E') { e.preventDefault(); expandAll(); }
  if (e.key === 'c' || e.key === 'C') { e.preventDefault(); collapseAll(); }
  if (e.key === '/' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); document.getElementById('searchInput').focus(); }
});
</script>
